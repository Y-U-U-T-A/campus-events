services:
  - type: web
    name: campus-events
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false # set this manually in Render dashboard
